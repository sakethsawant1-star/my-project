<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-waves">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M0,50 Q25,30 50,50 T100,50 L100,0 L0,0 Z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
            <path d="M0,70 Q25,50 50,70 T100,70 L100,0 L0,0 Z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
            <path d="M0,30 Q25,10 50,30 T100,30 L100,0 L0,0 Z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
        </svg>
    </div>

    <div class="login-container">
        <h1>Login</h1>
        <form>
            <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input type="text" placeholder="User Name" required>
            </div>
            
            <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" placeholder="Password" required>
            </div>
            
            <div class="options">
                <label class="remember">
                    <input type="checkbox">
                    <span class="custom-checkbox"></span>
                    Remember Me
                </label>
                <a href="#" class="forgot">Forget Me ?</a>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>
</body>
</html>
