name: Automated Data Ingestion Scheduler

on:
  # Run automatically at 2:00 AM UTC every day
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    permissions:
      # Required to push the updated database back to the repo
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase1_ingestion/requirements.txt

      - name: Run Phase 1.1 - Web Scraping
        run: python phase1_ingestion/scraper.py

      - name: Run Phase 1.2 - Data Cleaning & Chunking
        run: python phase1_ingestion/cleaner.py

      - name: Run Phase 1.4 - Embedding Generation
        run: python phase1_ingestion/embedder.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific folders that might have changed
          git add phase1_ingestion/data/
          git add phase1_ingestion/chunks/
          git add phase1_ingestion/chroma_db/
          
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: automated daily ingestion update of vector database"
            git push
          fi
